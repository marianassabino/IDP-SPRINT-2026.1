services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normalizador-jusbrasil-api
    environment:
      APP_NAME: ${APP_NAME:-Normalizador JusBrasil}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: uv run --no-dev uvicorn main:app --host 0.0.0.0 --port 8000 --reload
