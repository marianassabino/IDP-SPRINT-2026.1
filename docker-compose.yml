services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normalizador-jusbrasil-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: uv run --no-dev uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: normalizador-jusbrasil-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: normalizador-jusbrasil-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: "0"
      AWS_DEFAULT_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-normalizador-local}
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  localstack-data:
